name: tests

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "CLAUDE.md"
      - "README.md"
      - ".claude/**"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "CLAUDE.md"
      - "README.md"
      - ".claude/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: configure crustal access
        env:
          CRUSTAL_SSH_KEY: ${{ secrets.CRUSTAL_SSH_KEY }}
        run: |
          test -n "$CRUSTAL_SSH_KEY"
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          eval "$(ssh-agent -s)"
          ssh-add - <<< "$CRUSTAL_SSH_KEY"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          git config --global url."ssh://git@github.com/".insteadOf "https://github.com/"
      - name: Build
        run: cargo check --verbose
      - name: Check format
        run: cargo fmt --check
      - name: Run tests
        run: cargo test --verbose
